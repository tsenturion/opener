name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows exe and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Build executable
        shell: pwsh
        run: .\build.ps1 -SkipRootCopy

      - name: Prepare release asset
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $tag = "${{ github.ref_name }}"
          $prerelease = "false"

          if ($eventName -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
            $prerelease = "${{ inputs.prerelease }}"
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          $safeTag = $tag -replace "[^A-Za-z0-9._-]", "-"
          $assetName = "FileOpener-$safeTag-windows-x64.exe"

          Copy-Item -LiteralPath ".\dist\FileOpener.exe" -Destination ".\$assetName" -Force

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PRERELEASE=$prerelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset
          path: FileOpener-*-windows-x64.exe
          if-no-files-found: error

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseArgs = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            ".\$env:ASSET_NAME",
            "--repo",
            "${{ github.repository }}",
            "--title",
            "File Opener $env:RELEASE_TAG",
            "--notes",
            "Windows executable built by GitHub Actions.",
            "--target",
            $env:GITHUB_SHA
          )

          if ($env:PRERELEASE -eq "true") {
            $releaseArgs += "--prerelease"
          }

          gh @releaseArgs
